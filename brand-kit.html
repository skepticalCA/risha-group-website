<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Risha Group Limited | Brand Kit</title>
    <meta
      name="description"
      content="A black-and-gold brand kit for Risha Group Limited, anchored to the existing crest logo."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="Brand kit navigation">
      <a class="brand-mark" href="index.html" aria-label="Risha Group Limited home">
        <img class="brand-logo" src="assets/Risha%20logo.png" alt="Risha Group Limited logo" />
        <span>
          <strong>Risha Group</strong>
          <small>Brand Kit</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Brand kit menu">
        <a href="index.html#ventures">Ventures</a>
        <a href="index.html#standards">Standards</a>
        <a href="index.html#partner">Partner</a>
      </nav>
      <a class="nav-action" href="index.html">Back to Site</a>
    </header>

    <main class="kit-page">
      <section class="kit-hero reveal" aria-labelledby="kit-title">
        <div>
          <p class="eyebrow">Fixed-logo rebrand system</p>
          <h1 id="kit-title">Risha Brand Kit</h1>
        </div>
        <p>
          A premium black-and-gold identity direction built around the existing royal crest:
          regal, minimal, commercially credible, and ready for digital, packaging, and
          investor-facing applications.
        </p>
      </section>

      <section class="kit-grid" aria-label="Generated brand kit pages">
        <figure class="kit-card reveal">
          <img src="brand-kit/01-brand-world-hero.png" alt="Risha brand world hero page" />
          <figcaption>01 Brand World / Hero</figcaption>
        </figure>
        <figure class="kit-card reveal">
          <img src="brand-kit/02-logo-usage-system.png" alt="Risha logo usage system page" />
          <figcaption>02 Logo Usage System</figcaption>
        </figure>
        <figure class="kit-card reveal">
          <img src="brand-kit/03-color-typography.png" alt="Risha color and typography page" />
          <figcaption>03 Color + Typography</figcaption>
        </figure>
        <figure class="kit-card reveal">
          <img src="brand-kit/04-imagery-art-direction.png" alt="Risha imagery and art direction page" />
          <figcaption>04 Imagery + Art Direction</figcaption>
        </figure>
        <figure class="kit-card reveal">
          <img src="brand-kit/05-product-packaging.png" alt="Risha product and packaging page" />
          <figcaption>05 Product + Packaging</figcaption>
        </figure>
        <figure class="kit-card reveal">
          <img src="brand-kit/06-applications.png" alt="Risha cross-platform applications page" />
          <figcaption>06 Applications</figcaption>
        </figure>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
